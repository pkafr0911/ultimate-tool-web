<?xml version="1.0" encoding="UTF-8"?>
<!-- Simplified favicon-only version of Ultimate Tools & Utilities logo with larger inner elements -->
<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ultimate Tools Logo</title>
  <desc id="desc">A modern rounded-square gradient logo for Ultimate Tools and Utilities featuring a glowing toolkit mark, code brackets, and sparkle details.</desc>

  <defs>
    <linearGradient id="bg" x1="72" y1="48" x2="448" y2="464" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF718B"/>
      <stop offset="0.48" stop-color="#C471F5"/>
      <stop offset="1" stop-color="#85EBFD"/>
    </linearGradient>

    <linearGradient id="panel" x1="128" y1="104" x2="384" y2="408" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0.7"/>
    </linearGradient>

    <linearGradient id="mark" x1="150" y1="150" x2="362" y2="362" gradientUnits="userSpaceOnUse">
      <stop stop-color="#574B7E"/>
      <stop offset="0.5" stop-color="#C471F5"/>
      <stop offset="1" stop-color="#41B3FF"/>
    </linearGradient>

    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#574B7E" flood-opacity="0.28"/>
    </filter>

    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="14" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.77 0 1 0 0 0.44 0 0 1 0 0.96 0 0 0 0.45 0"/>
      <feBlend in="SourceGraphic" mode="normal"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bg)"/>

  <!-- Decorative glow blobs -->
  <circle cx="126" cy="118" r="82" fill="#FFFFFF" opacity="0.22"/>
  <circle cx="400" cy="392" r="104" fill="#85EBFD" opacity="0.24"/>
  <circle cx="404" cy="112" r="52" fill="#FFEEA8" opacity="0.2"/>

  <!-- Glass card -->
  <rect x="104" y="104" width="304" height="304" rx="78" fill="url(#panel)" filter="url(#shadow)"/>
  <rect x="114" y="114" width="284" height="284" rx="68" stroke="white" stroke-opacity="0.72" stroke-width="8"/>

  <!-- Central toolkit mark -->
  <g filter="url(#softGlow)">
    <!-- Code brackets -->
    <path d="M197 217L158 256L197 295" stroke="url(#mark)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M315 217L354 256L315 295" stroke="url(#mark)" stroke-width="28" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Tool handle / slash -->
    <path d="M284 174L228 338" stroke="url(#mark)" stroke-width="30" stroke-linecap="round"/>

    <!-- Small tool head circle -->
    <circle cx="291" cy="174" r="24" fill="white"/>
    <circle cx="291" cy="174" r="13" fill="#C471F5"/>

    <!-- Utility dot -->
    <circle cx="221" cy="338" r="18" fill="#85EBFD"/>
  </g>

  <!-- Sparkles -->
  <path d="M142 179L151 198L170 207L151 216L142 235L133 216L114 207L133 198L142 179Z" fill="#FF718B"/>
  <path d="M372 160L378 173L391 179L378 185L372 198L366 185L353 179L366 173L372 160Z" fill="#85EBFD"/>
  <path d="M364 336L371 351L386 358L371 365L364 380L357 365L342 358L357 351L364 336Z" fill="#C471F5"/>
</svg>